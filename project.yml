name: PokerCoach
options:
  bundleIdPrefix: com.mpcollins
  deploymentTarget:
    iOS: "17.0"
packages:
  PokerEngine:
    path: PokerEngine
targets:
  PokerCoach:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: PokerEngine
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.mpcollins.pokercoach
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
