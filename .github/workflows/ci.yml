name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  engine-tests:
    name: Engine tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run PokerEngine unit tests
        working-directory: PokerEngine
        run: |
          set -o pipefail
          swift test 2>&1 | tee test-output.log

      - name: Publish test summary
        if: always()
        run: |
          {
            echo "## PokerEngine test results"
            echo '```'
            grep -E "Test Suite '.*' (passed|failed)|Executed .* tests" PokerEngine/test-output.log | tail -25 || echo "No test output captured"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-test-log
          path: PokerEngine/test-output.log

  app-build:
    name: App build (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build PokerCoach for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild -project PokerCoach.xcodeproj -scheme PokerCoach \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO build 2>&1 | tee build.log | tail -60

      - name: Publish build summary
        if: always()
        run: |
          {
            echo "## App build"
            echo '```'
            grep -E "BUILD (SUCCEEDED|FAILED)|error:" build.log | tail -10 || echo "No build output captured"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
